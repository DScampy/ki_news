<!DOCTYPE html>
<html class="dark" lang="de">
<head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Archiv – KI News</title>
<meta name="description" content="Alle KI-News im Archiv. Täglich. Auf Deutsch. Mit Kontext."/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&family=Work+Sans:wght@300;400;500;600&display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
<script id="tailwind-config">
  tailwind.config = {
    darkMode: "class",
    theme: {
      extend: {
        colors: {
          "surface-tint": "#99cbff",
          "on-surface": "#dfe3ea",
          "on-surface-variant": "#bfc7d3",
          "surface-container-low": "#181c21",
          "surface-container": "#1c2025",
          "surface-container-high": "#262a30",
          "outline": "#89919d",
          "outline-variant": "#3f4851",
          "primary": "#99cbff",
          "primary-container": "#1d9bf0",
          "background": "#000000",
        },
        borderRadius: { DEFAULT: "0.125rem", lg: "0.25rem", xl: "0.5rem", full: "0.75rem" },
        spacing: { sm: "12px", xl: "64px", gutter: "16px", base: "8px", xs: "4px", lg: "40px", md: "24px", margin: "24px" },
        fontFamily: {
          "body-sm": ["Work Sans"],
          "headline-xl": ["Space Grotesk"],
          "body-lg": ["Work Sans"],
          "source-tag": ["Work Sans"],
          "label-bold": ["Work Sans"],
          "headline-md": ["Space Grotesk"]
        },
        fontSize: {
          "body-sm": ["14px", { lineHeight: "1.4", fontWeight: "400" }],
          "headline-xl": ["32px", { lineHeight: "1.2", letterSpacing: "-0.02em", fontWeight: "700" }],
          "body-lg": ["16px", { lineHeight: "1.5", fontWeight: "400" }],
          "source-tag": ["13px", { lineHeight: "1", fontWeight: "600" }],
          "label-bold": ["12px", { lineHeight: "1", letterSpacing: "0.05em", fontWeight: "700" }],
          "headline-md": ["20px", { lineHeight: "1.3", fontWeight: "600" }]
        }
      }
    }
  }
</script>
<style>
  body { background-color: #000; color: #dfe3ea; }
  .material-symbols-outlined { font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24; }
  ::-webkit-scrollbar { width: 4px; }
  ::-webkit-scrollbar-track { background: #000; }
  ::-webkit-scrollbar-thumb { background: #2f3336; border-radius: 10px; }
  .card-hover:hover h4 { color: var(--accent-color, #1d9bf0); }
  .search-clear { display: none; }
  .has-search .search-clear { display: flex; }
</style>
</head>
<body class="font-body-lg">

<!-- Top Nav -->
<nav class="fixed top-0 w-full z-50 flex justify-between items-center px-4 h-14 bg-black border-b border-[#2f3336]">
  <div class="flex items-center gap-8">
    <a href="/" class="flex items-center gap-2">
      <span class="text-xl font-black tracking-tighter text-[#1d9bf0] uppercase" style="font-family:'Space Grotesk',sans-serif">KI NEWS</span>
      <span class="hidden sm:inline text-[10px] font-mono text-gray-500 tracking-widest uppercase border border-[#2f3336] px-1.5 py-0.5">DE</span>
    </a>
    <div class="hidden md:flex items-center gap-6">
      <a class="text-sm font-medium text-gray-500 hover:text-white transition-colors" style="font-family:'Space Grotesk',sans-serif" href="/">Aktuell</a>
      <a class="text-sm font-medium text-[#1d9bf0] border-b-2 border-[#1d9bf0] pb-1" style="font-family:'Space Grotesk',sans-serif" href="#">Archiv</a>
      <a class="text-sm font-medium text-gray-500 hover:text-white transition-colors" style="font-family:'Space Grotesk',sans-serif" href="https://soundcloud.com/dscampy/scampy-s-podcast-china-stoppt" target="_blank">Podcast</a>
    </div>
  </div>
  <div class="flex items-center gap-4">
    <a href="https://x.com/CScampy" target="_blank" class="flex items-center gap-1.5 text-gray-400 hover:text-white transition-colors text-sm font-mono">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor"><path d="M18.244 2.25h3.308l-7.227 8.26 8.502 11.24H16.17l-4.714-6.231-5.401 6.231H2.744l7.737-8.835L1.254 2.25H8.08l4.253 5.622 5.911-5.622zm-1.161 17.52h1.833L7.084 4.126H5.117z"/></svg>
      <span class="hidden sm:inline">@CScampy</span>
    </a>
  </div>
</nav>

<!-- Sidebar -->
<aside class="fixed left-0 top-14 h-[calc(100vh-3.5rem)] w-[240px] z-40 flex-col py-6 bg-black border-r border-[#2f3336] hidden lg:flex overflow-hidden">
  <div class="px-5 mb-6">
    <p class="text-[11px] text-gray-500 font-mono leading-relaxed">Alle News im Archiv. Täglich kuratiert von @CScampy.</p>
  </div>

  <!-- Search in sidebar -->
  <div class="px-3 mb-4">
    <div id="searchWrap" class="flex items-center gap-2 bg-[#16181c] border border-[#2f3336] px-3 py-2">
      <span class="material-symbols-outlined text-gray-500 text-base">search</span>
      <input id="searchInput" type="text" placeholder="Suchen…"
        class="bg-transparent border-none outline-none text-xs text-gray-300 placeholder-gray-600 w-full font-mono"
        oninput="handleSearch(this.value)"/>
      <button class="search-clear text-gray-600 hover:text-white" onclick="clearSearch()">
        <span class="material-symbols-outlined text-base">close</span>
      </button>
    </div>
  </div>

  <!-- Source filters -->
  <div class="px-5 mb-4">
    <p class="text-[10px] text-gray-600 font-mono uppercase tracking-widest mb-3">Quellen</p>
    <div class="flex flex-col gap-1" id="sourceFilters"></div>
  </div>

  <div class="mt-auto px-5 pb-2">
    <div id="standInfo" class="border border-[#2f3336] p-3">
      <p class="text-[10px] text-gray-500 font-mono mb-1">LETZTES UPDATE</p>
      <p class="text-[11px] text-gray-400 font-mono" id="standLabel">—</p>
    </div>
  </div>
</aside>

<!-- Main Content -->
<main class="lg:ml-[240px] pt-14 min-h-screen bg-black">
  <div class="max-w-[1400px] mx-auto p-gutter">

    <!-- Header -->
    <div class="mt-gutter mb-lg flex flex-col sm:flex-row sm:items-end justify-between gap-4">
      <div>
        <h1 class="font-headline-xl text-headline-xl text-white mb-1" style="font-family:'Space Grotesk',sans-serif">Archiv</h1>
        <p class="text-gray-500 text-sm font-mono" id="countLabel">Wird geladen…</p>
      </div>
      <!-- Mobile search -->
      <div class="flex lg:hidden items-center gap-2 bg-[#16181c] border border-[#2f3336] px-3 py-2 max-w-xs">
        <span class="material-symbols-outlined text-gray-500 text-base">search</span>
        <input type="text" placeholder="Suchen…"
          class="bg-transparent border-none outline-none text-xs text-gray-300 placeholder-gray-600 w-full font-mono"
          oninput="handleSearch(this.value)"/>
      </div>
      <!-- View toggle -->
      <div class="flex items-center gap-2 bg-[#16181c] border border-[#2f3336] p-1">
        <button onclick="setLayout('grid')" id="btnGrid"
          class="flex items-center gap-1.5 px-3 py-1.5 text-xs font-mono uppercase tracking-wider transition-all text-[#1d9bf0] bg-[#1d1f23]">
          <span class="material-symbols-outlined text-sm">grid_view</span> Grid
        </button>
        <button onclick="setLayout('list')" id="btnList"
          class="flex items-center gap-1.5 px-3 py-1.5 text-xs font-mono uppercase tracking-wider transition-all text-gray-500 hover:text-white">
          <span class="material-symbols-outlined text-sm">view_list</span> Liste
        </button>
      </div>
    </div>

    <!-- Active filter chip -->
    <div id="filterChip" class="hidden mb-4 flex items-center gap-2">
      <span class="text-xs font-mono text-gray-400">Filter:</span>
      <span id="filterChipLabel" class="flex items-center gap-2 text-xs font-mono px-3 py-1 bg-[#16181c] border border-[#2f3336]">
        <span id="filterChipText"></span>
        <button onclick="clearFilter()" class="text-gray-500 hover:text-white">
          <span class="material-symbols-outlined text-sm">close</span>
        </button>
      </span>
    </div>

    <!-- Loading skeleton -->
    <div id="skeleton" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-gutter">
      <div class="bg-[#16181c] border border-[#2f3336] p-4 h-48 animate-pulse"></div>
      <div class="bg-[#16181c] border border-[#2f3336] p-4 h-48 animate-pulse"></div>
      <div class="bg-[#16181c] border border-[#2f3336] p-4 h-48 animate-pulse"></div>
      <div class="bg-[#16181c] border border-[#2f3336] p-4 h-48 animate-pulse"></div>
    </div>

    <!-- News grid -->
    <div id="newsGrid" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-gutter hidden"></div>

    <!-- Empty state -->
    <div id="emptyState" class="hidden py-24 text-center">
      <span class="material-symbols-outlined text-gray-700 text-5xl mb-4 block">search_off</span>
      <p class="text-gray-500 font-mono text-sm">Keine Artikel gefunden.</p>
      <button onclick="clearSearch(); clearFilter()" class="mt-4 text-[#1d9bf0] text-xs font-mono hover:underline">Filter zurücksetzen</button>
    </div>

    <!-- Footer -->
    <div class="mt-12 pb-12 border-t border-[#2f3336] pt-8 flex flex-col sm:flex-row items-center justify-between gap-4">
      <div>
        <span class="text-white font-black text-lg tracking-tighter" style="font-family:'Space Grotesk',sans-serif">KI NEWS</span>
        <p class="text-[11px] text-gray-500 font-mono mt-1">Täglich. Auf Deutsch. Mit Kontext. – von <a href="https://x.com/CScampy" target="_blank" class="text-[#1d9bf0] hover:underline">@CScampy</a></p>
      </div>
      <div class="flex items-center gap-4">
        <a href="/" class="text-gray-500 hover:text-white transition-colors text-xs font-mono">Aktuell</a>
        <a href="https://x.com/CScampy" target="_blank" class="text-gray-500 hover:text-white transition-colors text-xs font-mono">X/Twitter</a>
        <a href="https://soundcloud.com/dscampy/scampy-s-podcast-china-stoppt" target="_blank" class="text-gray-500 hover:text-white transition-colors text-xs font-mono">Podcast</a>
      </div>
    </div>
  </div>
</main>

<script>
// ── State ────────────────────────────────────────────────────────────────────
let allNews = [];
let activeSource = null;
let searchQuery = '';
let layout = 'grid';

// ── Source config ────────────────────────────────────────────────────────────
const SOURCE_CONFIG = {
  'The Decoder':    { color: '#1d9bf0', textClass: 'text-[#1d9bf0]' },
  'TechCrunch AI':  { color: '#ff6b35', textClass: 'text-[#ff6b35]' },
  'VentureBeat AI': { color: '#7c3aed', textClass: 'text-[#a78bfa]' },
  'MIT Tech Review':{ color: '#dc2626', textClass: 'text-[#f87171]' },
  'Ars Technica':   { color: '#16a34a', textClass: 'text-[#4ade80]' },
  'Heise':          { color: '#2563eb', textClass: 'text-[#60a5fa]' },
};
function srcConf(source) {
  return SOURCE_CONFIG[source] || { color: '#1d9bf0', textClass: 'text-[#1d9bf0]' };
}

// ── Load ─────────────────────────────────────────────────────────────────────
fetch('news.json?t=' + Date.now())
  .then(r => r.json())
  .then(data => {
    allNews = data.news || [];
    if (data.stand) {
      document.getElementById('standLabel').textContent = data.stand;
    }
    buildSourceFilters();
    render();
    document.getElementById('skeleton').classList.add('hidden');
    document.getElementById('newsGrid').classList.remove('hidden');
  })
  .catch(() => {
    document.getElementById('skeleton').classList.add('hidden');
    document.getElementById('countLabel').textContent = 'Fehler beim Laden.';
    document.getElementById('emptyState').classList.remove('hidden');
  });

// ── Source filters ────────────────────────────────────────────────────────────
function buildSourceFilters() {
  const sources = [...new Set(allNews.map(n => n.source).filter(Boolean))];
  const container = document.getElementById('sourceFilters');
  // All option
  const allBtn = document.createElement('button');
  allBtn.id = 'src-all';
  allBtn.className = 'flex items-center justify-between px-3 py-2 text-xs font-mono uppercase tracking-wider transition-all bg-[#1d1f23] text-[#1d9bf0] border-l-2 border-[#1d9bf0]';
  allBtn.innerHTML = `<span>Alle</span><span class="text-gray-600">${allNews.length}</span>`;
  allBtn.onclick = () => { clearFilter(); };
  container.appendChild(allBtn);

  sources.forEach(src => {
    const conf = srcConf(src);
    const count = allNews.filter(n => n.source === src).length;
    const btn = document.createElement('button');
    btn.id = 'src-' + src.replace(/\s/g, '-');
    btn.className = 'flex items-center justify-between px-3 py-2 text-xs font-mono uppercase tracking-wider transition-all text-gray-400 hover:text-white hover:bg-[#16181c]';
    btn.innerHTML = `<span>${src}</span><span class="text-gray-600">${count}</span>`;
    btn.onclick = () => setFilter(src);
    container.appendChild(btn);
  });
}

function updateSourceFilterUI() {
  const sources = [...new Set(allNews.map(n => n.source).filter(Boolean))];
  const allBtn = document.getElementById('src-all');
  if (allBtn) {
    allBtn.className = !activeSource
      ? 'flex items-center justify-between px-3 py-2 text-xs font-mono uppercase tracking-wider transition-all bg-[#1d1f23] text-[#1d9bf0] border-l-2 border-[#1d9bf0]'
      : 'flex items-center justify-between px-3 py-2 text-xs font-mono uppercase tracking-wider transition-all text-gray-400 hover:text-white hover:bg-[#16181c]';
  }
  sources.forEach(src => {
    const btn = document.getElementById('src-' + src.replace(/\s/g, '-'));
    if (btn) {
      const conf = srcConf(src);
      btn.className = activeSource === src
        ? `flex items-center justify-between px-3 py-2 text-xs font-mono uppercase tracking-wider transition-all bg-[#1d1f23] border-l-2 text-white`
        : 'flex items-center justify-between px-3 py-2 text-xs font-mono uppercase tracking-wider transition-all text-gray-400 hover:text-white hover:bg-[#16181c]';
      if (activeSource === src) {
        btn.style.borderLeftColor = conf.color;
        btn.style.color = conf.color;
      } else {
        btn.style.borderLeftColor = '';
        btn.style.color = '';
      }
    }
  });
}

// ── Filters & search ─────────────────────────────────────────────────────────
function setFilter(src) {
  activeSource = src;
  const chip = document.getElementById('filterChip');
  document.getElementById('filterChipText').textContent = src;
  chip.classList.remove('hidden');
  chip.classList.add('flex');
  updateSourceFilterUI();
  render();
}

function clearFilter() {
  activeSource = null;
  const chip = document.getElementById('filterChip');
  chip.classList.add('hidden');
  chip.classList.remove('flex');
  updateSourceFilterUI();
  render();
}

function handleSearch(q) {
  searchQuery = q.trim();
  const wrap = document.getElementById('searchWrap');
  if (searchQuery) wrap.classList.add('has-search');
  else wrap.classList.remove('has-search');
  render();
}

function clearSearch() {
  searchQuery = '';
  document.getElementById('searchInput').value = '';
  document.getElementById('searchWrap').classList.remove('has-search');
  render();
}

function setLayout(l) {
  layout = l;
  const grid = document.getElementById('newsGrid');
  const btnGrid = document.getElementById('btnGrid');
  const btnList = document.getElementById('btnList');
  if (l === 'grid') {
    grid.className = 'grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-gutter';
    btnGrid.className = 'flex items-center gap-1.5 px-3 py-1.5 text-xs font-mono uppercase tracking-wider transition-all text-[#1d9bf0] bg-[#1d1f23]';
    btnList.className = 'flex items-center gap-1.5 px-3 py-1.5 text-xs font-mono uppercase tracking-wider transition-all text-gray-500 hover:text-white';
  } else {
    grid.className = 'grid grid-cols-1 gap-3';
    btnList.className = 'flex items-center gap-1.5 px-3 py-1.5 text-xs font-mono uppercase tracking-wider transition-all text-[#1d9bf0] bg-[#1d1f23]';
    btnGrid.className = 'flex items-center gap-1.5 px-3 py-1.5 text-xs font-mono uppercase tracking-wider transition-all text-gray-500 hover:text-white';
  }
  render();
}

// ── Render ────────────────────────────────────────────────────────────────────
function render() {
  const q = searchQuery.toLowerCase();
  const filtered = allNews.filter(n => {
    if (activeSource && n.source !== activeSource) return false;
    if (q && !(n.title||'').toLowerCase().includes(q) && !(n.summary||'').toLowerCase().includes(q)) return false;
    return true;
  });

  const grid = document.getElementById('newsGrid');
  const empty = document.getElementById('emptyState');
  const countLabel = document.getElementById('countLabel');

  if (filtered.length === 0) {
    grid.innerHTML = '';
    empty.classList.remove('hidden');
    countLabel.textContent = 'Keine Artikel';
    return;
  }
  empty.classList.add('hidden');
  countLabel.textContent = `${filtered.length} Artikel${activeSource ? ' · ' + activeSource : ''}${searchQuery ? ' · "' + searchQuery + '"' : ''}`;
  grid.innerHTML = '';
  filtered.forEach(item => grid.appendChild(createCard(item)));
}

function createCard(item) {
  const conf = srcConf(item.source);
  const isList = layout === 'list';
  const a = document.createElement('a');
  a.href = item.link || '#';
  if (item.link) a.target = '_blank';
  a.style.setProperty('--accent-color', conf.color);
  a.className = `card-hover bg-[#16181c] border border-[#2f3336] hover:bg-[#1d1f23] hover:border-opacity-80 transition-all group cursor-pointer flex ${isList ? 'flex-row items-start gap-4 p-4' : 'flex-col p-4 h-full'}`;
  a.style.borderHoverColor = conf.color;

  if (isList) {
    a.innerHTML = `
      <div class="flex-1 min-w-0">
        <div class="flex items-center gap-2 mb-2 flex-wrap">
          <span style="background:${conf.color}" class="text-white px-2 py-0.5 text-[10px] font-mono rounded-sm uppercase flex-shrink-0">${item.source || '—'}</span>
        </div>
        <h4 class="font-headline-md text-white leading-snug transition-colors mb-1 text-base" style="font-family:'Space Grotesk',sans-serif">${item.title || ''}</h4>
        <p class="text-on-surface-variant font-body-sm text-body-sm line-clamp-2">${item.summary || ''}</p>
      </div>
      <span class="material-symbols-outlined text-gray-600 text-sm flex-shrink-0 mt-1">open_in_new</span>`;
  } else {
    a.innerHTML = `
      <div class="flex items-center justify-between mb-4">
        <span style="background:${conf.color}" class="text-white px-2 py-0.5 font-source-tag text-source-tag rounded-sm uppercase">${item.source || '—'}</span>
        <span class="material-symbols-outlined text-gray-600 text-sm">open_in_new</span>
      </div>
      <h4 class="font-headline-md text-white mb-2 leading-snug transition-colors flex-grow" style="font-family:'Space Grotesk',sans-serif">${item.title || ''}</h4>
      <p class="text-on-surface-variant font-body-sm text-body-sm mt-auto pt-3 border-t border-[#2f3336] line-clamp-2">${item.summary || ''}</p>`;
  }
  return a;
}
</script>
</body>
</html>
