<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  html { font-size: 16px; }
  body { font-family: 'Work Sans', sans-serif; min-height: 100vh; transition: background 0.3s, color 0.3s; }

  /* Light theme */
  body.light {
    --bg: oklch(98% 0.005 80);
    --bg-alt: oklch(96% 0.006 80);
    --bg-card: oklch(100% 0 0);

    --accent: oklch(52% 0.18 240);
    --accent-bg: oklch(95% 0.05 240);
    --accent-text: oklch(35% 0.18 240);

    --bg-card-hover: oklch(20% 0.012 240);
    --border: oklch(26% 0.015 240);
    --border-strong: oklch(32% 0.015 240);
    --text-primary: oklch(90% 0.008 80);
    --text-secondary: oklch(68% 0.01 240);
    --text-muted: oklch(48% 0.01 240);
    --accent: oklch(72% 0.16 220);
    --accent-bg: oklch(25% 0.06 220);
    --accent-text: oklch(80% 0.16 220);
    --tag-bg: oklch(22% 0.015 240);
    --sidebar-bg: oklch(12% 0.012 240);
    --header-bg: oklch(14% 0.01 240 / 0.94);
    --shadow: 0 1px 6px oklch(0% 0 0 / 0.3);

  .sent-THREAT   { --s-bg: oklch(85% 0.14 25 / 0.15);  --s-text: oklch(48% 0.2 25);   --s-border: oklch(60% 0.2 25 / 0.35); }
  .sent-NEUTRAL  { --s-bg: oklch(94% 0.004 240 / 0.3); --s-text: var(--text-secondary); --s-border: var(--border); }

    position: relative; transition: background 0.25s;

    width: 12px; height: 12px; border-radius: 50%;

  .cat-list { display: flex; flex-direction: column; gap: 2px; }

    padding: 1px 7px; color: var(--text-muted);

  .cat-item.active .cat-count { background: var(--accent-bg); color: var(--accent-text); opacity: 0.7; }

  /* Month timeline */
  .month-timeline { display: flex; flex-direction: column; gap: 2px; }
  .month-item {
    display: flex; align-items: center; gap: 10px;
    padding: 7px 10px; border-radius: 6px;
    font-size: 13px; cursor: pointer;
    color: var(--text-secondary); font-weight: 500;
    transition: all 0.15s;
    position: relative;
  }
  .month-item:hover { background: var(--bg-alt); color: var(--text-primary); }
  .month-item.active { background: var(--active-month-bg); color: var(--active-month-text); font-weight: 600; }
  .month-dot {

  .month-item:hover .month-dot { background: var(--accent); }
  .month-count { margin-left: auto; font-size: 11px; font-weight: 600; color: var(--text-muted); }

  /* Main content */
  .main { flex: 1; min-width: 0; }
  .main-header { display: flex; align-items: baseline; justify-content: space-between; margin-bottom: 24px; gap: 16px; }
  .main-title {
    font-family: 'Space Grotesk', sans-serif;
    font-size: 22px; font-weight: 700;
    letter-spacing: -0.02em; color: var(--text-primary);
  }
  .main-subtitle { font-size: 13px; color: var(--text-muted); }

  /* View toggle */
  .view-toggle { display: flex; gap: 4px; background: var(--bg-alt); border: 1px solid var(--border); border-radius: 8px; padding: 3px; }
  .view-btn {

  .week-recap {

    border: 1px solid var(--border);

  .card-date { font-size: 11px; color: var(--text-muted); font-weight: 500; white-space: nowrap; }

  .card-title {
    font-family: 'Space Grotesk', sans-serif;
    font-size: 15px; font-weight: 600; line-height: 1.35;
    letter-spacing: -0.01em; color: var(--text-primary);
    transition: color 0.15s;
  }
  .news-card:hover .card-title { color: var(--accent); }
  .layout-dense .card-title { font-size: 13px; line-height: 1.3; }
  .layout-list .card-title { font-size: 16px; }

  .card-desc { font-size: 13px; line-height: 1.5; color: var(--text-secondary); display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }
  .layout-dense .card-desc { display: none; }
  .layout-list .card-desc { -webkit-line-clamp: 2; }

  .card-footer { display: flex; align-items: center; justify-content: space-between; gap: 8px; margin-top: auto; padding-top: 10px; border-top: 1px solid var(--border); }

  .ext-link {
    font-size: 11px; font-weight: 600; letter-spacing: 0.04em;
    text-transform: uppercase; color: var(--accent);
    opacity: 0.7; transition: opacity 0.15s;
  }
  .news-card:hover .ext-link { opacity: 1; }

  /* Empty state */
  .empty { text-align: center; padding: 64px 24px; color: var(--text-muted); }
  .empty h3 { font-family: 'Space Grotesk', sans-serif; font-size: 16px; font-weight: 600; margin-bottom: 8px; color: var(--text-secondary); }

  /* Scrollbar */
  ::-webkit-scrollbar { width: 6px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: var(--border-strong); border-radius: 3px; }
</style>

const MONTHS = [
  { key:"2026-04", label:"April 2026" },
  { key:"2026-03", label:"März 2026" },
  { key:"2026-02", label:"Februar 2026" },
];

const CATEGORIES = [...new Set(NEWS.map(n => n.cat))].sort();

const SENT_LABELS = { BULLISH:"Bullish", CAUTION:"Vorsicht", THREAT:"Warnung", NEUTRAL:"Neutral", SYMBOL:"Symbolisch", OFFEN:"Offen", VERGLEICH:"Vergleich" };

// ─── Components ──────────────────────────────────────────────────────
function SentTag({ sent }) {
  return <span className={`tag-sent sent-${sent}`}>{SENT_LABELS[sent] || sent}</span>;
}

function NewsCard({ item, layout }) {
  return (
    <a href={item.url} target="_blank" rel="noopener" className={`news-card layout-${layout}`} onClick={e => item.url === '#' && e.preventDefault()}>
      <div className={`card-body`}>
        <div className="card-top">
          <div className="card-tags">
            <span className="tag-cat">{item.cat}</span>
            <SentTag sent={item.sent} />
          </div>
          <span className="card-date">{item.date.slice(5).replace('-','.')}</span>
        </div>
        <div className="card-title">{item.title}</div>
        {layout !== 'dense' && <div className="card-desc">{item.desc}</div>}
      </div>
      <div className="card-footer">
        <span className="tag-source">{item.src}</span>
        <span className="ext-link">{item.url !== '#' ? 'Lesen →' : '—'}</span>
      </div>
    </a>
  );
}

function MonthGroup({ monthKey, monthLabel, items, layout }) {
  if (!items.length) return null;
  return (
    <div>
      <div className="month-heading">
        <h2>{monthLabel}</h2>
        <div className="month-heading-line"></div>
        <span className="month-heading-count">{items.length} Artikel</span>
      </div>
      <div className={`news-grid layout-${layout}`}>
        {items.map(item => <NewsCard key={item.id} item={item} layout={layout} />)}
      </div>
    </div>
  );
}

const TWEAK_DEFAULTS = /*EDITMODE-BEGIN*/{
  "theme": "light",
  "layout": "grid",
  "showWeekRecap": true
}/*EDITMODE-END*/;

function App() {
  const [tweaks, setTweak] = useTweaks(TWEAK_DEFAULTS);

  const [activeMonth, setActiveMonth] = useState(null);
  const [activeCat, setActiveCat] = useState(null);

  // sync theme
  useEffect(() => {
    document.body.className = tweaks.theme;
  }, [tweaks.theme]);

  // counts
  const catCounts = useMemo(() => {
    const m = {};
    NEWS.forEach(n => m[n.cat] = (m[n.cat]||0)+1);
    return m;
  }, []);

  const monthCounts = useMemo(() => {
    const m = {};
    NEWS.forEach(n => {
      const mk = n.date.slice(0,7);
      m[mk] = (m[mk]||0)+1;
    });
    return m;
  }, []);

  // filter
  const filtered = useMemo(() => {
    return NEWS.filter(n => {
      if (activeCat && n.cat !== activeCat) return false;
      if (activeMonth && !n.date.startsWith(activeMonth)) return false;
      return true;
    });
  }, [activeCat, activeMonth]);

  const topStories = useMemo(() => NEWS.filter(n => n.top), []);

  // group by month
  const grouped = useMemo(() => {
    return MONTHS.map(m => ({
      ...m,
      items: filtered.filter(n => n.date.startsWith(m.key))
    }));
  }, [filtered]);

  const totalCount = filtered.length;

  return (
    <div className="app">
      {/* Header */}
      <header className="header">
        <a href="http://ki-news.live" className="header-logo">
          KI <span>NEWS</span>
        </a>
        <nav className="header-nav">
          <a href="http://ki-news.live">Aktuell</a>
          <a href="#" className="active">Archiv</a>
          <a href="https://soundcloud.com/dscampy/scampy-s-podcast-china-stoppt">Podcast</a>
        </nav>
        <div className="header-right">
          <button
            className="theme-toggle"
            onClick={() => setTweak('theme', tweaks.theme === 'light' ? 'dark' : 'light')}
          >
            {tweaks.theme === 'light' ? '☾' : '☀'}
            <div className={`toggle-track ${tweaks.theme === 'dark' ? 'on' : ''}`}>
              <div className="toggle-thumb"></div>
            </div>
            {tweaks.theme === 'light' ? 'Hell' : 'Dunkel'}
          </button>
        </div>
      </header>

      <div className="page-body">
        {/* Sidebar */}
        <aside className="sidebar">
          <div className="sidebar-section">
            <div className="sidebar-title">Kategorien</div>
            <div className="cat-list">
              <div className={`cat-item ${!activeCat ? 'active' : ''}`} onClick={() => setActiveCat(null)}>
                <span>Alle</span>
                <span className="cat-count">{NEWS.length}</span>
              </div>
              {CATEGORIES.map(cat => (
                <div key={cat} className={`cat-item ${activeCat === cat ? 'active' : ''}`} onClick={() => setActiveCat(activeCat === cat ? null : cat)}>
                  <span>{cat}</span>
                  <span className="cat-count">{catCounts[cat] || 0}</span>
                </div>
              ))}
            </div>
          </div>

          <div className="sidebar-section">
            <div className="sidebar-title">Zeitraum</div>
            <div className="month-timeline">
              <div className={`month-item ${!activeMonth ? 'active' : ''}`} onClick={() => setActiveMonth(null)}>
                <div className="month-dot"></div>
                <span>Alle Monate</span>
                <span className="month-count">{NEWS.length}</span>
              </div>
              {MONTHS.map(m => (
                <div key={m.key} className={`month-item ${activeMonth === m.key ? 'active' : ''}`} onClick={() => setActiveMonth(activeMonth === m.key ? null : m.key)}>
                  <div className="month-dot"></div>
                  <span>{m.label}</span>
                  <span className="month-count">{monthCounts[m.key] || 0}</span>
                </div>
              ))}
            </div>
          </div>
        </aside>

        {/* Main */}
        <main className="main">
          <div className="main-header">
            <div>
              <h1 className="main-title">Archiv</h1>
              <p className="main-subtitle">
                {totalCount} Artikel{activeCat ? ` · ${activeCat}` : ''}{activeMonth ? ` · ${MONTHS.find(m=>m.key===activeMonth)?.label}` : ''}
              </p>
            </div>
            <div className="view-toggle">
              {['grid','list','dense'].map(v => (
                <button key={v} className={`view-btn ${tweaks.layout === v ? 'active' : ''}`} onClick={() => setTweak('layout', v)}>
                  {v === 'grid' ? 'Grid' : v === 'list' ? 'Liste' : 'Kompakt'}
                </button>
              ))}
            </div>
          </div>

          {/* Weekly recap */}
          {tweaks.showWeekRecap && !activeCat && !activeMonth && (
            <div className="week-recap">
              <span className="recap-label">KW18 Top-Stories</span>
              <div className="recap-stories">
                {topStories.map(s => (
                  <a key={s.id} href={s.url} target="_blank" rel="noopener" className="recap-pill">{s.title}</a>
                ))}
              </div>
            </div>
          )}

          {/* Groups */}
          <div style={{display:'flex', flexDirection:'column', gap:36}}>
            {grouped.every(g => g.items.length === 0) ? (
              <div className="empty">
                <h3>Keine Artikel gefunden</h3>
                <p>Versuche einen anderen Filter.</p>
              </div>
            ) : (
              grouped.map(g => (
                <MonthGroup key={g.key} monthKey={g.key} monthLabel={g.label} items={g.items} layout={tweaks.layout} />
              ))
            )}
          </div>
        </main>
      </div>

      {/* Tweaks */}
      <TweaksPanel>
        <TweakSection title="Darstellung">
          <TweakRadio id="theme" label="Modus" options={[{value:'light',label:'Hell'},{value:'dark',label:'Dunkel'}]} value={tweaks.theme} onChange={v => setTweak('theme', v)} />
          <TweakRadio id="layout" label="Layout" options={[{value:'grid',label:'Grid'},{value:'list',label:'Liste'},{value:'dense',label:'Kompakt'}]} value={tweaks.layout} onChange={v => setTweak('layout', v)} />
          <TweakToggle id="showWeekRecap" label="Wochenrückblick anzeigen" value={tweaks.showWeekRecap} onChange={v => setTweak('showWeekRecap', v)} />
        </TweakSection>
      </TweaksPanel>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
