name: KI News

on:
  schedule:
    # Berlin = UTC+2 (Sommerzeit)
    # 7 / 12 / 17 / 20 Uhr Berlin = 5 / 10 / 15 / 18 UTC
    - cron: "0 5,10,15,18 * * *"
  workflow_dispatch:  # Manueller Start per Knopf in GitHub Actions

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Repository auschecken
        uses: actions/checkout@v4

      - name: Python einrichten
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: KI News ausführen
        env:
          OPENROUTER_KEY: ${{ secrets.OPENROUTER_KEY }}
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          GROQ_CHAT_KEY: ${{ secrets.GROQ_CHAT_KEY }}
        run: |
          echo "=== KI NEWS START ===" > ki_news.log
          echo "Startzeit: $(date)" >> ki_news.log
          MAX_RETRIES=3
          RETRY_DELAY=10
          for i in $(seq 1 $MAX_RETRIES); do
            echo "Versuch $i von $MAX_RETRIES" >> ki_news.log
            if python3 ki_news.py >> ki_news.log 2>&1; then
              echo "Erfolgreich!" >> ki_news.log
              break
            else
              echo "Fehler im Versuch $i" >> ki_news.log
              if [ $i -lt $MAX_RETRIES ]; then
                echo "Warte $RETRY_DELAY Sekunden..." >> ki_news.log
                sleep $RETRY_DELAY
              fi
            fi
          done
          echo "Endzeit: $(date)" >> ki_news.log
          echo "=== KI NEWS ENDE ===" >> ki_news.log

      - name: Dateien ins Repo committen
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add index.html ki_news.html news.json 2>/dev/null || true
          git add archive.json 2>/dev/null || true
          git add chat-config.js 2>/dev/null || true
          git add hashtags/hashtags.json 2>/dev/null || true
          git commit -m "KI News Update $(date +'%Y-%m-%d %H:%M')" || echo "Keine Aenderungen"
          # Rebase vor Push – verhindert "rejected: fetch first" wenn Actions-Runs sich überlappen
          git pull --rebase origin main || true
          git push

      - name: Log hochladen
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: ki-news-log
          path: ki_news.log
