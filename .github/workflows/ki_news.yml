name: KI News Update

on:
  schedule:
    - cron: '0 5 * * *'   # 7 Uhr
    - cron: '0 10 * * *'  # 12 Uhr mittags
    - cron: '0 15 * * *'  # 17 Uhr
    - cron: '0 18 * * *'  # 21 Uhr abends
  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      
      - name: Python einrichten
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'
      
      - name: Script ausführen
        env:
          NVIDIA_API_KEY: ${{ secrets.NVIDIA_API_KEY }}
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
        run: python ki_news.py
      
      - name: HTML pushen
        run: |
          git config user.email "action@github.com"
          git config user.name "GitHub Action"
          git add ki_news.html
          git commit -m "News Update $(date)" || exit 0
          git push
